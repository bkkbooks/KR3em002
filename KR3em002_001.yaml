body:
  text: 卷一明目賦夫人之有兩眼猶天之有兩曜視萬物察纖毫何所不至日月有一時之晦者風雲雷雨之所致也眼之失明者四氣七情之為害也大抵眼目為五臟之精華一身之至要故五臟分五輪八廓名八卦五輪者肝屬木曰風輪在眼為烏睛心屬火曰血輪在眼為二眥脾屬土曰肉輪在眼為上下胞肺屬金曰氣輪在眼為白睛腎屬水曰水輪在眼為瞳子至若八廓無位有名膽之腑為天廓膀胱之腑為地廓今因後八廓圖改作山廓好記亦無害理且長於言語從之命門之腑為水廓今改火廓從之大腸之腑為山廓今改風廓從之三焦之腑為澤廓今改為肺之腑從之此雖為眼目之本根而有藉血為之包絡五臟或蘊積風熱或有七情之氣鬱結不散上攻眼目各隨五臟所屬而見或腫而痛羞澀多淚或生障膜昏暗失明其證七十有二治之法須究其因風則攻散之熱則清涼之氣則調順之切不可輕用針刀點割偶得其愈出乎僥幸倘或不然為害不淺又且不可過用涼劑恐冰其血脈凝而不流亦成痼疾當量人老少氣體虛實用藥又有腎虛者亦能令人眼目無光或生冷翳止當補暖下元益其腎水北方之人患眼最多皆是日冒風沙夜臥熱炕二氣交蒸使然治之多用涼藥北方之人稟受與南方不同也疹痘之後毒氣鬱於心肝二經不能自已發於眼目傷於瞳人者素無治法眼科論世之最貴者莫過於人人之最貴者莫過於目眼乃一身之珍寶能觀萬物照耀無窮內連五臟外應五行今時患眼者皆因外受風寒暑濕內為憂思喜怒五勞七傷四氣七情或餐五辛或好淫色早乘煙霧久視燈光皆為患眼之源輕則昏蒙重則翳障致成胬肉遮睛眵淚爛眩或被五風所害或然障膜所侵無須治眼先保元陽切宜洗心滌慮然後服藥隨證治之或洗或針或烙或割封貼明辨患證切宜細心醫治其功難述孫真人諭眼論夫眼者五臟之精華一身之至寶如天之日月其可不保護哉骨之精為瞳人屬腎筋之精為黑睛屬肝血之精為脈絡屬心氣之精為白睛屬肺肉之精為約束屬脾人之造化皆從眼目生於肝心脾肺腎肢體手足今人多好淫欲耗散元陽五臟不和上盛下虛血不能流傳致令熱氣上攻眼目赤腫疼痛隱澀難開翳膜遮睛羞明怕日或然表虛外受風寒其氣在裡內須頭痛發作無時經年日久致令翳障侵睛內障或飲酒過多常食熱物皆為損眼之源明辨數方濟無之周凡有眼證察其義理隨患證治之陰陽相應辨論人稟五行造化陰陽匹配成形是曰五輪有位八廓分形五輪應五行按五方內五臟出五運曰金木水火土者也人質之中皆荷五應之扶持所謂八廓者分八卦應八廓故眼為清淨之寶屬日月之通幽膽脈相連配於天道之象隨於瞻視其用清虛外通五輪內應八廓其經故無正名內間為之天地水火風雷山澤應是八廓而有病根形於證候凡觀察於何經廓位虛實冷熱氣之所侵用藥士大夫詳推至理矣上古天真論眼科夫眼者一身之至寶能觀天地照耀無窮今時之人有內障失明亦有翳膜疼痛者何也天真曰今時之人以酒為漿以色為常醉以入房以欲竭其精以酒散其真不知持滿不時損神務快其樂逆於生理起居無節亦有或受風寒或勞神散氣致使然也夫上古聖人之教下也正其心以正其身保陰護陽筋脈調和骨髓堅固血氣皆順若從此法是以嗜欲不能勞其目淫邪不能惑其心內外調和耳目自然聰明也問曰今時之人不能樽節失其調理患之所侵何以濟之天真人曰人之目者眼胞周匝則有二四之穴若生赤膜可以手法治之將息一月以能去暗而復明疼痛昏眛者得痊用在各方遂傳於世而人習之若能誠意通明乃濟世活人之道也通明論夫眼者榮身之寶如天之日月能觀山河之秀麗能照萬物之精華宜安其身調持保護然不睹光明者任有千金萬玉以榮其富貴縱有金飾佳人以解其憂愁何睹也且傷今時患眼者皆因感受風寒入內邪氣相傳風血並行風氣盛而血氣多致成翳膜遮障胬肉侵睛諸般異證不時疼痛視物不明凡是此證用藥治療但收一半之功未能盡臻其效當須手法除去病根則曰知源其眼胞者周匝一寸三分按五輪八廓出乎其十二之經分為二三之穴若生諸患切宜詳細驗源治之其赤筋者某生是患眼之源亦有陰精光明者乎能治者得濟人之功不能治者誤損神光取瘥則難精通祕要明其諸穴得其真傳方能取效濟世之道也軒轅黃帝說眼病目科帝曰外障者肝中得病內障者膽中用藥外障肝上有膜先令吃藥去膜然後用點藥內障者膽上有膜膽汁熱枯用藥調理喚作青風內障虛則補之二十以上三十以下涼藥多不妨五十以上七十以下宜用溫藥赤眼毒眼須用治心肺血氣之藥審其虛實解心肺氣先宜解後點洗及患翳膜眼睛不疼痛不用宣解婦人血氣先治頭風然後治眼非俗說之談凡人患眼皆因酒色思慮憂愁悲哭食毒鹹酸致令血氣不均肝氣損動調理肝肺則用藥明矣四季五行發揮妙訣天地造化陰陽變通五行匹配而有象四肢體類以成形天有日月人有雙眸在眼通乎腎臟外分五輪內應五臟運稟四時通流百脈是乃春和萬物木旺之時肝氣盛而腎氣衰夏日敷榮火氣炎上心氣旺而肝氣衰秋令收成金氣騰旺肺氣旺而肝氣衰冬至滯根水性乃全腎氣旺而肝氣生乃曰子母生成之造化人眼者肝之外候也肝氣不和則瘀血灌睛肺氣不和則眼睛澀癢脾氣不和則白仁淡黃腎氣不和則多流冷淚心氣不和則時常赤澀血輪受病察於心風輪受病察於肝水輪受病察於腎肉輪受病察於脾氣輪受病察於肺故乃相生相剋理正明源識五臟之盛衰知四時之造化自有生以來皆資氣血氣滯血虛目病自生若氣血調和安有斯患人登事務多貪酒色大冒風寒暑濕過食口味將息失度以致肝膽受於風邪因入膀胱而致冷淚冬天大寒春天凜烈九夏清涼三秋酷熱陰陽毒氣則春三陽所生故陰陽雜于丹田毒氣一日二日離丹田三日四日在脾胃五日六日在臟腑或傳變而目赤在肝而目痛在肺而多癢在腎而瞻視不明在脾而爛眩倒睫在肝膽而胬肉攀睛克在脾胃三焦而視物不明克在膀胱故有頭痛流淚瞻視昏花補肝散實能奏效脾冷則珠睛澀癢驅風散而相之腎冷則黑花散亂補腎丸大有奇功肺冷瞻視難開清肺散而調之有熱兮柴胡散發散仍使通肝散腫兮清肝散通利兼用涼脾決明散羚羊角散還睛散衆疾施為地黃丸定心丸息內有效胎前産後檀香散當歸散二宜散須當詳用冷熱風虛五退散清涼散白薇散消息效驗目赤深紅眼睛痛澀乃肝經實熱須當瀉肝清心涼脾其效必矣目赤淡紅眼睛微澀乃肝經虛熱須當溫涼調順驅逐是疾愈焉如故氣粗口味不攬是乃脾胃積熱翳障遮睛或如粟粒成如梅花白仁腫痛肺與腸積熱不腫而有瘡翳者肺臟傳於風涎赤脈多者心之虛也白睛黃者酒欲食傳脾胃血灌瞳人心經壅熱腎經風熱羞明生花無翳者宜補痛如針刺者通利即除眼睛癢者驅風旋愈撞刺者住痛為先斑瘡者消毒宜早調理陰陽所謂醫者乃人之司命通達玄微始終有準妄行針刺藥有誤身深可戒也明目賦人眸有患扶救在醫視陰陽與虛實察形色與盛衰總二十四方之體用分七十二證之候門得高賢之趣則超然解晤遇達人示教則表我扶危又質曰地黃散專治混睛外障驅風散能除癢極難任衝風淚出清肺散消除暴風客熱兩眥赤脈犀角飲愈除黃膜上衝清涼散冰翳瑕深而有效消毒散瞼生風粟以無虞圓翳內障坐起生花黑翳如珠肝虛雀目補肝散補腎丸悉能療治兩瞼黏睛胎風赤爛風繾喎斜胞肉凝脂消風散五退散盡獲平安白薇丸善止漏睛膿出洗肝散能平突出睛高諺云雞冠蜆肉蟹睛神祟撞刺熱病傷寒肝腸積熱石決明散果驗逆順生翳黑風青緑內障花翳白陷羚羊角散可投牛角膏小兒睛痛即止柴胡散小兒斑痘掃除詳論冰翳零花拳毛倒睫血灌瞳人瞼肉硬痛旋螺突起赤膜下垂通肝散而絶妙滑翳澀翳白翳黃心痛如針剌玉翳浮睛小兒疳眼還睛散而可投黑花內障涼瞻丸而有效烏風形狀瀉肝散服安康決明丹六神散小兒痘眼可用定心丸二黃丸侵睛胬肉以兼行偷針撞刺昧目飛塵荊防散而最妙赤眼麻痘風熱癢痛勝金散而絶高兔肝丸蛤粉散專治小兒斑痘大通散四靈散偏醫血灌瞳人爛眩風眼碧霞散青蠶兒澤可洗胎前産後二宜散檀香散服則安康地黃丸拳毛倒睫而可宜遠志丸丁翳根深而可除豫曰當尋古義猶有玄機審玄文則倏然解悟蒙指示則助我扶危先須審認浮沉堪會人神在眼天空狼藉血忌休囚四方風靜云收全假三光相助遠年近日深細團圓狀若明珠出海形如星月相同或火熱昏蒙或時刻不見須在窮究知趣洞別玄微如啓盤而呈珠擬撥雲而見日則力才之功於茲可見矣太玄真人論眼病五輪所屬風輪屬木在臟為肝在眼為烏睛也問曰風輪如何得病答曰喜怒不常或勞心力雲中瞻視百物燈下看讀經書眼力既勞風輪內損則眼澀痛睛疼視物不真眼眩緊急日久不治昏蒙細小也問曰如何治答曰按本草對證當治肝肝氣盛攻於風輪也宜服羚羊角散羚羊角散羚羊角磋末五錢人參一錢皂角兩半蜜浸防風五錢甘草五錢草烏一兩生用川芎一兩上為末每服二錢用木賊甘草煎調服日進三服忌生冷詩曰東方屬木木生風在臟為肝竅目通飢飽不均生熱毒睛疼有翳主侵瞳血輪屬火在臟為心在眼為大小眥也問曰血輪如何得病答曰憂愁思慮悲喜煩惱內傷於心致生赤筋白膜遮睛昏蒙難開日久不治遂致失明也問曰如何治答曰按本草對證當理心心血之熱攻於血輪也宜服地黃丸地黃丸生地黃白朮青葙子山梔子荊芥穗當歸木通黃芩各等分為末煉蜜為丸每服三十丸淡竹葉煎湯送下如用砂糖水下亦可詩曰心火南方屬丙丁熱風流入臟中停眥頭兩目赤兼澀遠視渾如散碎星肉輪屬土在臟為脾胃在眼為上下瞼也問曰肉輪如何得病答曰為人多好熱酒嗜食五辛上嶺奔走開弓驟騎肉輪既損內感於脾瘀血侵睛腫攻胞廓翳障經年不退昏暗竟日難開也問曰如何治答曰按本草對證當理脾脾熱毒攻於肉輪宜服薏苡仁散薏苡仁散薏苡仁一兩甘草白茯苓一兩石決明一兩大黃黑牽牛各五錢上為末每服二錢食後煎臘茶吞下詩曰太陰屬土主脾元積熱傳脾胃被纏上下眼皮浮又赤偷針為患古今傳氣輪屬金在臟為肺在眼為白睛也問曰氣輪如何得病答曰凌霜冒雪或受飢寒肌體稍虛邪毒內攻或腫或昏赤筋隱澀視太陽如隔霧睹人物似疑煙日久不治變成障翳也問曰如何治答曰按本草對證當治肺毒多生白膜青筋赤筋也宜服蒺藜散蒺藜散白蒺藜炒去刺川芎當歸羌活海蛤蜜炙荊芥穗各等分為末每服二錢茶清或米泔調下詩曰肺臟停留冷熱停兩睛不覺澀沉沉但將涼藥調衛榮毋使昏沉似血形水輪屬水在臟為腎在眼為瞳人也問曰水輪如何得病答曰久飲久坐色欲無厭大喜傷神大怒損志愛食酒面五辛有傷腎經侵於黑光致令冷淚傾流風虛內作或腫或疼結成翳障多澀昏也問曰如何治答曰按本草對證當理腎經乃腎虛敗攻水輪常多昏暗視物久則黑花生也宜服枸杞子丸枸杞子丸枸杞子二兩黑附子一兩炒五味子二兩蟬蛻去頭足一兩全蠍七個不炒蒼朮一兩兩錢米泔水浸上為細末蜜為丸每服三十丸米湯或鹽湯送下詩曰腎臟原因受賊邪起居眼目主生花只因色重傷元氣冷藥休餐疾不瘥問曰眼有五輪者何也答曰眼有風輪血輪肉輪氣輪水輪所以名為五輪也太玄真人問眼病因論八廓所屬八卦也乾為天乾屬金膽之經名清淨廓足少陽脈主之問曰天廓如何得病答曰或云中射物月下看書多食腥膻侵冒寒暑致令生病昏蒙多出冷淚不能辨物問曰如何治答曰按本草封證治天廓昏蒙生淚也宜服清神散清神散防風一兩川椒一兩去皮香附子一兩炒薄荷一兩五錢加川芎一兩上為末每服一錢臨臥茶清送下酒亦可詩曰視物依稀似露中時時將手拭睛瞳要知冷淚頻頻下此是肝虛膽氣攻坤為地坤屬土腎之經名陰會廓足少陰脈主之問曰地廓如何得病答曰或因濕發堆於頭上冷氣壅於睛瞳因而生病為眵多眼眩緊急瘀肉生起也問曰如何治答曰按本草對證治侵睛之故宜服當歸散當歸散當歸羌活山梔子牛蒡子白朮甘草共為末每服一錢蜜水調服詩曰腎為納病曉元由酒色雖多更帶憂莫道睛疼無大故看看橫膜障雙眸坎為水坎屬水胃之經名水穀廓足陽明脈主之問曰水廓如何得病答曰大喜大怒有傷於心毆擊相持開虧驟騎強力成疾其病昏澀熱淚多出也問曰如何治答曰按本草對證治水廓睛疼白翳侵睛淚出之故宜服洗鏡丹洗鏡丹密蒙花黃芩家菊花白茯苓蟬蛻炒夜明砂炒上為末水糊為丸每服三十丸豬肝湯送下詩曰食氣傷脾及胃中更加積熱兩相沖胞眩漸腫眼中赤不解胃中熱不通離為火離屬火命門之經名抱陽廓手少陰脈主之問曰火廓如何得病答曰精神恐懼情懷鬱結內動心腎上攻火廓致令赤脈侵瞳人熱淚如傾也問曰如何治答曰按本草對證治赤腫多疼熱淚之故宜服玄精石散玄精石散玄精石石膏穀精草蟬蛻連翹甘草上等分為末每服一錢蜜水調食後服詩曰內抱真人是命門眼前花亂色難分不能補腎調肝膽赤脈交加兩眼昏巽為風巽屬木大腸之經名傳道廓手陽明脈主之問曰風廓如何得病答曰枕邊穴隙窗下穿竅不能遮蔽坐臥當風腦畔斜風攻於輪廓致令睛疼兩瞼常瞤昏澀多淚也問曰如何治答曰按本草對證此治昏癢多淚之故宜服楮實子丸楮實子丸楮實子四兩炒木賊黃芩白朮四兩菟絲子一兩酒浸蒸熟研爛焙乾為末入藥肉蓯蓉一兩酒浸上為末蜜丸如梧桐子大每服三十丸空心鹽湯下酒亦可詩曰傳道多因是本經肝經多熱滯風停大腸若順應須好癢澀之時翳抱睛震為雷震屬木小腸之經名關泉廓手太陽脈主之問曰雷廓如何得病答曰宴罷貪睡酒後行房血脈泛濫精髓閉塞風邪內聚上攻於目致令眥頭赤腫瞼內生瘡倒睫拳毛攀睛胬肉生也問曰如何治答曰按本草對證治赤筋攀睛拳毛之故宜服水鏡散水鏡散當歸一兩甘草三錢蟬蛻三個黃連五錢家菊花川芎一兩上為末每服一錢調蜜水下井水亦可忌羊肉面醃臟五辛之物詩曰小腸經屬關泉廓受病先從心上傳兩眥多生眵淚癢但調心熱自然涼艮為山艮屬土膀胱之經名津液廓足太陽脈主之問曰山廓如何得病答曰或手拳打觸或竹木誤簽血灌睛瞳致令生瘡翳膜若不早治永遭黑暗也問曰如何治答曰按本草對證治瘀血胬肉侵睛疼痛之故宜服地黃丸地黃丸生地黃川芎人參白蒺藜去刺當歸酒洗防風上為末蜜丸如梧桐子大每服三十丸食後茶清送下詩曰膀胱屬水腎為虛冷熱相刑本臟居睛赤兼黃輪廓內不逢妙手豈能醫兌為澤兌屬金肺之經名養化廓手太陰脈主之問曰澤廓如何得病答曰春不宣五臟冬聚於陽毒或因食炙肉火毒之氣聚於腎水致令腦脂凝聚血毒攻目一似薄霧遮隔又如飛蠅來往結成眵淚瞻視難開也問曰如何治答曰按本草對證治額常眼痛黑花多淚難開之故宜服煮肝散煮肝散木通緑豆皮黃芩羌活上為末用豬肝切開入藥三兩半用線扎定以米泔水煮天明飯後吃以豬肝同藥細嚼月進三次每服藥一錢用豬肝三兩摻藥也詩曰三焦為臟肺中藏胃熱衝風犯目光涼膈祛邪方可用若投熱藥病難當論五輪受病之因肝病是風輪色黃而赤交受風熱色黃而黑乃肝肺冷心病是血輪色赤而疾心受熱毒赤而痛者心主夏之氣脾病是肉輪色黃而腫是脾虛色赤而癢是脾氣積熱腎病是水輪色黃而光是腎受風熱之邪色昏而濁腎氣虛敗肺病是氣輪色黃而赤風熱毒攻赤極而痛火毒傷金醫者辨明萬無一失用藥無瘥論八廓受實熱病之因肝熱胬肉攀睛宜理肝涼膽也膽熱睛生翳膜疼痛宜涼膽退肝熱也心熱是赤脈不散宜涼心也肺熱胞瞼生瘡宜涼肺也脾熱睛痛宜涼脾胃也腎熱睛生虛障痛腫宜均腎氣也膀胱熱生倒睫拳毛也腸熱浮翳遮睛宜涼心肺也論八廓受虛寒病之因肝冷有淚羞明宜補腎肝和氣也膽冷昏暗兩瞼澀宜補腎益肝也心冷氣不順宜溫脾也眼睛疼宜溫脾生血也腎冷則生黑花宜補腎生精也膀胱冷則多昏暗大腸冷則眼昏宜服暖藥也肺冷受風邪寒氣宜補心肺也脾冷則目閉不開也凡須用藥究其源庶無謬矣論五行所屬金木水火土位風輪屬肝東方甲乙木位理肝經氣毒攻目昏澀疼痛赤腫風熱冷翳侵睛宜服瀉肝散當歸一錢茯苓一錢人參一錢防風一錢羌活二錢蒺藜二錢蟬蛻一錢去腳荊芥二錢甘草上為末每服三五錢酒送下茶亦可血輪屬心南方丙丁火位理心經熱毒暴赤血絲侵睛血灌瞳人昏澀難開宜服洗心散生地黃白芍藥川芎槐花當歸防風朴硝荊芥大黃甘草梔子仁炒為末龍膽草上藥各等分為末淡竹葉煎湯調下每服三五錢重者日三服肉輪屬脾中央戊己土位理兩胞浮腫胬肉攀睛瘀血偷針眼宜服枳殼散川芎枳殼上為末厚朴煎湯下蜜湯送下亦可每服三五錢氣輪屬肺西方庚辛金位理肺經白膜遮睛羞明怕日視物如煙昏澀癢痛宜服防風散防風蒼朮羌活荊芥當歸甘草上各等分為末每服三五錢茶清送下水輪屬腎北方壬癸水位理腎經昏暗黑花頭痛冷淚視物不明青盲內障宜服補腎丸巴戟山藥破故紙小茴香青鹽肉蓯蓉牡丹皮五錢枸杞子十兩上為末蜜丸每服五十丸鹽湯送下又治肉輪太陽穴疼痛翳膜侵睛瘀血時作赤腫經年不退宜服薏苡仁散薏苡仁茯苓石決明白牽牛大黃上各等分為末每服三五錢茶清調送下四季所屬春屬木三陽一陰夏屬火二陽三陰秋屬金四陽二陰冬屬水一陽四陰五輪所屬五輪證治八廓之圖孫真人還睛表大唐真觀十九年二月二十八日相州湯陰縣崔村蘇門山集仙洞真人孫思邈進是表大有奇功醫者用之甚有驗矣臣問世間最貴者莫過於人人之最貴者莫過於眼眼者按五臟六腑之精華一身之珍寶能觀萬物照耀無窮皎潔如珍珠包含於天地內連於肝膽外應於六經眼雖屬於竅門乃歸腎而不主腎屬北方壬癸水心屬南方丙丁火心腎不安則水火交戰水火相剋故聚血氣停流膽損肝虛目因受病凡須治療先須補腎後乃修肝肝是腎之苗腎是肝之主修肝則神魂安定補腎則精魄流通魂魄既得安和眼目自然明朗譬如種果惟在修根根壯則枝葉方榮根損則苗蕊何立黑睛屬腎腎虛則腦痛淚竅通肝肝風則冷淚常出白仁屬肺肺熱則赤脈通睛上瞼下瞼屬脾脾風則拳毛倒睫大眥小眥屬心心熱則攀睛胬肉眼分五輪內應五臟肝心脾肺腎又屬五行者金木水火土五輪者氣輪風輪肉輪水輪血輪勿信愚醫妄行鉤割切須細尋方論藥物精研夫人好食丹藥或夜尋心苦用精神或膽中受熱或肺上受寒或食好五辛毒魚菜鮓蔥蒜韭愛色貪淫或縱七情之偏或瞻星視日或近火沖煙或即深思不睡思慮家園無歇致使三焦壅熱遂乃迎風淚出視物如煙生覷空中似雪霜之形視太陽如同水底蓋因腎臟衰敗夜夢鬼交眼前似黑花繚亂看物依稀如此動靜便是損目之根源日久月深變成大患年少不聞道恣意隨心酒後逞情飯飽便臥或即冬天近火夏日耽涼醉臥當風不能回護貪淫樂欲不能拋形或身家豐富年力壯盛酒色過度誰思損目之殃由於腎氣衰敗致令禱鬼祈神積苦身形其病成矣今乃按其本草主治處方此藥能養腎安神久則搜風明目補暖除邪但依方備合常服治眼萬無一失名曰還睛丸共十味炮炙不同特定君臣但能服餌剋日當愈不惟男子老幼服之無妨臣曾驗實為制辨物精爽後備方於下陛下永施昌瀆聖德臣無任瞻仰之至還睛丸此方但能剋日取效也川芎酒浸白蒺藜炒去刺白朮木賊去節甘草炙羌活青葙子菟絲子照前制密蒙花防風家菊花楮實川當歸酒洗上藥十三味各二兩為末煉蜜丸如梧桐子大每服三十丸白湯送下或鹽湯送下亦可煮針法烏頭五錢去尖巴豆五錢硫黃麻黃各三錢五分木鱉子五個烏梅五個上用藥同針入罐內水煮一日洗淨去鏽再用止痛藥煮過乳香沒藥當歸花藥面各二分半又煮一日取出針用皂角水洗再用狗肉血內煮一日仍用瓦屑打磨乾淨正直又用菘子油塗常要近人氣針則不痛矣明堂問答七十二證之因一問曰人病患眼者何也答曰或因酒色憂愁思憶悲哀或因食鹹酸血氣不均肝經損動久則患目矣二問曰眼赤而痛者何也答曰五臟積熱毒傳於肝木目乃肝之外象肝受邪氣使血散亂流注於目故赤而痛也宜服酒調散四順散八解散三問曰赤而不痛者何也答曰乃肝實也肝者血之源肝實則血盛血盛則流注於四肢血氣上衝侵於睛瞳目受其血故赤而不痛也宜服四順散撥雲散八解散洗心散瀉肝散四問曰眼赤而昏者何也答曰乃肝虛也肝主木木生火火發則木衰火屬心心主血血隨火升而上灌於目侵於瞳人故眼赤而昏也宜服洗肝補膽散活血散順肝散還光丸黃耆丸五問曰大眥赤者何也答曰乃心實也五臟分布皆屬於心心者帝王之職離火之位熱積於中火炎於上故大眥赤者心之實也宜服三黃丸洗心散菊花散早晨昏洗肝散六問曰小眥黃者何也答曰乃心虛也心主火火乃土之母子能令母虛土實則火虛故脾土之色應於外是知心虛而小眥黃也宜服人參茯苓煎硃砂膏定志丸七問曰眼白膜眵多者何也答曰乃肺實也肺屬金金生水其色白熱傷於肺故白膜生焉水溢而成眵淚本肺之精華故淚出自為眵多結而黏硬也宜服瀉肺散桑白皮湯洗心散八問曰眵淚多出稀而不結者何也答曰乃肺虛也肺金受心火邪氣所克則金見火而化水故水流溢出於淚堂故眵淚多稀而不結宜服阿膠散艾煎丸洗肺散桑白皮湯九問曰羞明怕日者何也答曰乃脾實也脾屬土土化濕濕傳於肝肝受脾邪上騰於目濕熱相攻津華澀結不榮於目故羞明怕日也宜服密蒙花散千里光散十問曰視物不真者何也答曰乃脾虛也蓋人身之血氣皆稟受於脾土上貫於目而為明脾虛則五臟之精氣皆失所司不能歸明於目矣故視物不真也宜服蒼朮湯千里光散十一問曰茫茫黑花如蠅羽者何也答曰乃腎實也腎乃肝之母母實則榮於子肝受腎邪傳於膽經膽為神水之源因熱邪所幹故時復黑花茫茫如蠅羽飛也宜服苦參散豬苓湯艾煎丸晚蠶砂湯十二問曰迎風灑淚者何也答曰乃腎虛也腎虛則不能榮於肝肝乃腎之子故木弱而畏風飄故迎風灑淚者腎之虛也宜服地黃丸還睛丸石燕子丸十三問曰赤筋侵睛者何也答曰心乘肝也心主血肝藏血而主筋血侵於筋流傳於目血筋侵睛者故知乘肝也宜服大當歸散三黃丸此亦子母相刑之化大黃湯十四問曰白膜遮睛者何也答曰此肺克肝也肺金色白風邪在肺中其金大旺能剋木故白膜遮睛也宜服連翹散密蒙花散十五問曰迎風燥癢者何也答曰肝受邪也風熱之邪侵於肝肝木招風故迎風燥動而癢也宜服荊芥散青鹽散苦芥子散十六問曰日中目昏者何也答曰痰火所致也蓋真陽之氣旺於巳午之時真陽之氣太旺則心火騰肝而痰愈壅故日中目昏也宜服半夏丸辰砂丸桑螵蛸丸十七問曰早晨目昏者何也答曰乃頭風攻注也頭為六陽之會清晨陽氣初會於首又寅卯之時肝木大旺肝主風木故云頭風攻注也宜服芎藭散石膏散蒺藜散十八問曰夜間目昏者何也答曰乃腦損也腦者天真之物行陰道而不行陽道至申酉戌亥時寒氣方旺腦損而被風寒所襲故目昏也宜灸風池穴風府穴十九問曰夜間目痛者何也答曰此陰毒盛也蓋陰好靜陽好動因氣血散漫而行陰道寒邪克之使寒邪之氣大盛而妄動申時痛至寅時陰之使也宜服回陽湯補腎丸乳香丸二十問曰白日目痛者何也答曰此陽毒盛也經云晝則陽生夜則陰生少陽膽經旺於寅衰於申故陽毒盛於晝乃上攻於目而白日痛也宜服乳香散瀉心湯洗肝散二十一問曰浮翳遮睛者何也答曰乃肺經熱也肺者氣之源氣妄動即是火氣盛則火炎於上熱攻於目故白翳生焉宜服瀉肺湯三黃丸四順散二十二問曰抱羅突起者何也答曰乃睛之損也睛者臟腑之精華常令清淨則無恙矣苟或熱攻於內毒攻於外則結成膿血而抱羅突起也宜服救睛丸蟬蛻無比散珍珠散珊瑚琥珀膏二十三問曰眼睫倒入者何也答曰乃肺損也肺者五臟之華蓋主於皮毛經云一損損於肺皮聚而毛落故知拳毛倒睫者肺之損也宜服救睛丸菊化丸阿膠煎二十四問曰青膜遮睛者何也答曰此外障也五臟蘊毒熱氣攻衝上侵於目目屬肝其色青故生青膜遮睛也宜服珊瑚琥珀膏救睛丸決明丸洗肝散二十五問曰背側瞳人者何也答曰此內障也五行應變升降為先氣盛血衰凝滯不能榮於目故瞳人不能轉動而背側也宜服夜光椒紅丸地黃活血煎當歸鹿茸丸二十六問曰頭暈目昏者白星亂起何也答曰此血衰也血為一身之榮周流諸脈血衰則諸脈不旺六陽不舉故頭暈目昏白星亂起宜服川芎散當歸活血散二十七問曰眼不痛不癢赤而昏者何也答曰此氣衰也血之流行隨氣升降二者相濟則一身通泰若血結則成癰疽氣凝則成痿痹是以正氣衰弱則眼目不痛不癢而赤昏也宜服順肝丸透經勻氣丸蟬花散明目益腎丸明目地黃丸二十八問曰血侵睛者何也答曰此肝經虛也目者肝之候津液之道路總脈之所聚也邪熱客於肝肝虛則血散流走兩目故赤而侵睛也宜服五苓散補肝丸連翹散地黃丸二十九問曰眼久昏如物遮睛者何也答曰此衛實也衛行脈外而主於氣氣實則挾熱上衝而侵於目故久昏如物遮之狀宜服木賊散連翹散三十問曰目昏痛而憎寒者何也答曰此衛虛也衛主腠理衛虛則腠理不密寒邪乘虛而入故痛而憎寒也宜服香附豬苓散白朮湯益黃湯三十一問曰目痛而體熱者何也答曰此榮實也榮衛乃陰陽之道路在上屬心與肺在下屬腎與肝痛而體熱者邪在心心者少陰君火化而發也宜服洗心散解肌湯菊花餅子三十二問曰乍明乍暗者何也答曰此榮虛也蓋目得血而能視榮血既虛則經絡之周流有滯而不能常榮於目矣故時復乍明乍暗也宜服調氣丸當歸艾煎丸夜光椒紅丸三十三問曰左眼赤而傳於右眼者何也答曰此陽經太旺也六經有陽中之陰陰中之陽陽中之陰心也陰中之陽肝也心經蘊熱邪傳於肝肝傳於目左目屬太陽右目屬太陰左目傳於右目者陽經太旺也宜服木通散三黃丸洗心散五苓散三十四問曰右眼赤傳於左眼者何也答曰此陰絡太旺也人有三百六十五絡有陽絡有陰絡陰絡之脈繫於右目右目傳於左目故知陰絡旺也宜服瀉肺湯橘皮湯導赤湯苦參散三十五問曰左右互相赤紅者何也答曰血邪攻衝也肝臟不足為風邪所幹風熱相爭左右來往有偏盛偏衰故左右互相赤紅也宜服蠶蛾丸芍藥湯三十六問曰目赤而澀痛者何也答曰此風熱沖攻也肝者厥陰風木之經風邪所湊與熱相搏氣血痞塞時發澀癢也宜服芍藥湯二霜膏三十七問曰白上微紅絲四眩瞼紅赤爛者何也答曰此乃風熱干脾胃也風邪客於腠理濕氣相爭於兩瞼之間因而淫濕侵爛也宜服省風湯三十八問曰眼睛通黃者何也答曰此因酒毒也盛渴大樂飲酒如漿貪嗜過度隨經絡注流上下往來至夜血朝於肝晨血朝於目引酒之毒灌注瞳人使目通黃也宜服雄黃丸貫衆散三十九問曰眼不能遠視而能近視者何也答曰此因勞傷臟腑風邪客之使精華之氣衰弱肝經不足蓋有水而無火也故不能遠視而能近視也宜服補肝散蟬花散補心定志丸加茯苓主之四十問曰日不能近視而能遠視者何也答曰蓋有火而無水也故不能近視而能遠視當補腎宜服地黃丸地黃丸服不效可服定志丸四十一問曰眼疾治已愈至期而復發者何也答曰乃是隨天地之氣令人疾也假如冬至一得甲子太陽膀胱經旺二得甲子陽明胃經旺三得甲子少陽膽經旺此三陽經絡臟也夏至一得甲子太陰脾經旺二得甲子少陰腎經旺三得甲子厥陰肝經旺此三陰經絡臟也各旺六十日其氣一周復假如太陽經受病交冬至節氣六十日內而復發太陰受病交夏至節氣六十日內而後發當隨其時令而治之隨其經而療之用藥各有所宜治則無不愈矣宜服消風勝血散連翹丸四十二問曰眼睛細小者何也答曰此乃脾損也蓋脾主肌肉肌肉清瘦飲食不為肌膚外感風邪克於腠理使肌肉緊急積毒於目也宜服人參和脾湯四物豬肝丸省風湯補肺散四十三問曰胬肉侵睛者何也答曰乃脾經積毒也脾者倉稟之官肌肉之府毒氣攻衝肌肉壅塞邪氣傳於肝肝受脾邪傳於雙目故胬肉侵睛也宜服青鹽丸防風丸三黃丸蕤仁膏四十四問曰眼積年赤而不愈者何也答曰此風熱傷於肝也肝應於目風熱傷之則目赤肌體虛弱則相火煽動熱邪不退故積年赤而不愈宜服省風湯牡丹丸當歸活血丸四十五問曰兩眼腫者何也答曰此風毒也肝主目肝虛不足風冷相擊風邪相攻上干於目致令胞瞼結核數日不散或時自散或感風毒而復腫也宜服洗肝散瞿麥湯消風飲子消毒丸四十六問曰眼珠突出者何也答曰此臟腑陰陽不和也目者乃陰陽之精魂魄之主因風熱痰氣蘊積於臟腑之中以致陰陽不和鬱結風熱攻衝於目致令眼睛疼痛之甚而珠突出也宜服救睛散陰陽五和湯四十七問曰眼前常有黑花者何也答曰乃肝之虛也目者肝之外象血氣不足則肝虛不榮於目神彩昏暗故黑花常見也宜服補肝散夜光椒紅丸芎藭散夜光散四十八問曰目中飛紅血者何也答曰此厥陰經血旺也厥陰脈起於足大拇趾之端肝經血氣太旺風熱相乘入連於目故眼睛大赤或來或往故云飛血也宜服芍藥湯退赤散夜光椒紅丸四十九問曰目澀者何也答曰此內動臟腑也或當時悲泣淚出不止使液道開而不閉液道乾枯臟腑勞動邪氣觸於肝衝於目傳於血氣睛源不固故發流澀也宜服三黃丸益鹽丸二霜膏補真丸五十問曰大病後眼昏者何也答曰此陰陽痞塞血氣大虛神光不完故茫茫昏瞶也宜服人參芍藥湯橘皮煎丸黃耆丸石燕丸五十一問曰陽毒病後昏者何也答曰此因下之太過五臟無陰六腑無陽久經宣利臟腑虛弱脾胃未和肌肉未實勞動氣血故目昏也宜服蒼朮湯黃耆丸鱉甲柴胡湯半夏丸五十二問曰陰毒病後昏者何也答曰此因受熱太過也因服熱藥或多炙灼大病稍退復出冒風肝氣不勝風火相乘即目昏也宜服三黃丸瞿麥散菊花散三黃瀉心湯加芒硝五更服五十三問曰過水昏者何也答曰此冷氣攻衝於肝也兩足脛下太溪穴下名復溜復溜之下名湧泉湧泉穴即足少陰經也絡於膀胱水氣冷侵兩足直從腎上攻於肝而傳於目以致昏也宜服蒼朮湯術苓湯五十四問曰孕婦眼昏者何也答曰此因血不榮於目也妊娠血惟養於胞胎不榮於肝肝氣虛乏故目昏也宜服茯苓補肝散虛消散椒紅丸五十五問曰産後眼昏者何也答曰此産後去血過多營衛皆虛神光遂乏故目昏也宜服菊花散人參椒紅丸當歸活血煎四物湯五十六問曰小兒生下未及周年兩目赤爛者何也答曰此胎毒也小兒未生時穢濁凝於兩目胞瞼之間既生之後浴湯拭之不幹潔留於眼內又為風邪所乘故令兩眼赤爛也宜服黃連散樺皮南星湯五十七問曰小兒瘡疹入眼內者何也答曰乃小兒未生時在母腹中飲其穢血及生下時養母不能以手拭口中之血血隨兒啼吞入腹中留於臟腑遂生瘡疹又因穢血攻衝或保護失時故毒遂攻於目也宜服蛤粉散五十八問曰小兒眼生翳障者何也答曰眼為五臟精華肝之外候外感風熱內有痰實以壅肝臟沖發於目故眼生翳障也宜服瞿麥散五十九問曰小兒眼生白障者何也答曰乃肺實痰壅也熱攻於肝肝屬木木色青痰熱攻衝於肝灌注瞳人瞳人勞動故生白膜散漫於目為白障也宜服乾薑丸琥珀散救睛丸半夏丸六十問曰小兒雀目者何也答曰乃肝不和也此是五臟蘊熱經絡凝滯陰陽不和營衛不通使目晝明而夜昏如雀目之眊然也宜用豬肝膏六十一問曰小兒青盲者何也答曰此臟腑虛弱或因飲食所傷臟腑不宜元氣衰微故目不赤不痛無翳無膜而昏暗不見物也宜服羌活散決明散犀角象牙丸人參菊花散六十二問曰小兒眼中生瘡者何也答曰此因初生洗浴之時拭不乾淨穢惡侵染於目兩瞼之間一感外熱即發粟米之瘡連胞瞼赤爛也宜服白蘚散六十三問曰大人胞瞼生風粟瘡者何也答曰此脾肺二經受風邪熱毒肺主皮毛脾主肌肉二經失職風熱邪毒即乘虛而入沖攻於目故胞瞼之間生此風粟之瘡宜服鯊皮散省風湯石膏散六十四問曰青盲有白膜者何也答曰此熱傷於肝風木相乘相火煽動消爍真陰內損神光外生白膜如蠅羽之狀也宜服犀角象牙丸決明丸六十五問曰淚目之狀者何也答曰此風邪客於目眥津液乘之常出冷淚時發癢故曰淚目之狀也宜服艾煎丸六十六問曰眼睛漏膿者何也答曰臟腑太虛風熱之毒上攻於目以致瞳人內損故成漏膿宜服救睛丸琥珀散通神丸六十七問曰眼偏視者何也答曰此臟腑偏衰血脈不通陰陽錯亂目官失職故一目上不見一目下不見名曰偏視宜服換經腸救睛湯五肝丸犀角象牙丸連翹散六十八問曰目眇者何也答曰此經絡偏絶氣血衰乏或風邪停留傷於內外使大小眥血氣不均故目眇也宜服均氣散省風湯硃砂散六十九問曰雙目忽然白睛腫者何也答曰此肺氣壅滯熱毒上攻令白睛忽腫若無疼痛宜服桑白皮湯瀉肺湯羊肝丸痛者宜用瀉心瀉肝之劑七十問曰挑針眼者何也答曰此脾經受熱毒傳於肝肝受脾毒也令胞瞼上生癤名曰挑針宜服消毒飲子洗心散當歸丸七十一問曰眼撞打生翳障者何也答曰目者神水之宗不受物觸忽被物觸撞令眼生翳障過百日不治宜服鎮肝散蒺藜散順光散七十二問曰風牽入瞼者何也答曰此臟腑不和陰陽不分經絡凝滯氣血不通為風乘虛而入令目轉去也故曰風牽入瞼宜服鎮肝丸和氣丸人參菊花散七十三問曰瞳人散者何也答曰此膽經損也膽者目之經神水之源膽碎則瞳人散也宜服救睛琥珀膏眼有七十三證內有十四證不治眼睛突出不治眼睛陷下不治瞳人乾枯不治丁翳根深不治轆轤轉睛不治烏風內障不治沉翳內障不治黑翳如珠不治蟹眼睛疼不治劇驚內障不治旋螺突起不治風輪內障不治瞳人生白翳不治高風雀目無血不治緑風眼瞳人碧緑是烏風眼滯澀瞳人開大是內障眼瞳人不動全無明是
