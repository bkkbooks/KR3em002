body:
  text: 卷二眼科七十二證受疾之因圓翳內障鷓鴣天圓翳烏珠一點圓日中羞小暗中玄始生輪廓無知覺竟被為殃把目纏補肝散補腎丸若投冷藥病尤煎此是肝腎虛而得醫士精求莫罔然此是肝腎風虛點去翳思用冷藥宜服五子丸拂手散錦鳩丸岩電丸冰翳內障鷓鴣天冰翳如冰凍實堅陰觀陽看淚潸然無時白膜侵睛內疼而難忍苦憂煎通肝散服心處此名膽氣苦肝纏良醫用藥無差懼眸子光明勝似前此是肝腎久虛熱風久痛其病宜以調理肝腎此是熱淚凝結生翳也宜服岩電丸三花五子丸撥雲散滑翳內障西江月滑翳何尚安足微含黃色無家水銀白色透瞳遮拴繫心猿意馬肝肺風熱相弄不疼不痛為佳還睛散服是生涯調寄西江月下此是肝腎風虛內有熱不散五般風熱毒日久不治永沉黑暗也宜服拂手散三花五子丸岩電丸澀翳內障西江月澀翳微微色赤或開或聚如花試看瞳子似煙霞無淚時疼痛也肝肺熱風相侮還睛散服為佳煩憑妙藥點無瘥右調西江月下此是腎風熱四時陰陽失調理色欲勞苦故有此也宜服三花五子丸撥雲散勝金散聚寶散橫翳內障鷓鴣天橫翳內障甚蹺蹊上橫劍脊下微微厚處厚兮薄處薄不疼不癢是根基如斯狀病者稀人沾此證實難醫若逢妙手金針撥退了依然日上遲此是腎臟虛熱也斯疾多難治也宜服三花五子丸聚寶散岩電丸拂手散浮翳內障鷓鴣天浮翳內障色如銀白光如水透瞳仁此病初生來小眥三焦不順病之因不癢痛不精神目無光力翳來頻等閒莫要空嗟嘆醫士求之免受辛此是腦熱脂凝也即聚散翳也宜服鎮心丸連翹散退血散偃月內障鷓鴣天翳如偃月似凝脂肝經病證本來稀缺處薄兮重處白瑕疵無定不須醫投針藥豈能施未知何日是安期記此叮嚀難強力任逢盧扁總成非此是腎敗邪毒熱也此疾難治也宜服三花五子丸夢靈丸拂手散散翳內障西江月散翳形如魚點只因粟米生延瞼紅赤爛是根源熱淚時常流瞼日夜珠疼痛楚皆因肝肺為冤還睛散服是神仙管取觀高望遠此是腎臟熱毒也肺家熱生翳也宜服岩電丸宣肺散沉翳內障鷓鴣天沉翳名為內障邪白藏黑水若無瑕目中細看如白銀兩瞼難開淚若麻空費力莫生嗟早輕晚重療難嘉求神拜佛空燒紙醫士徒勞莫療他此是腎虛肝膽壅熱生翳也宜服鎮肝丸三花五子丸退翳散夢靈丸宜點黃連膏棗花內障鷓鴣天肝臟停留熱賊風痛如針刺病來攻周圍微細如魚子視物如煙泛不同棗花翳甚昏蒙早輕晚重痛難容專心藥服還睛散醫士馳名實有功其翳周圍如鋸齒之狀此是心熱腎風熱肝膽熱也宜服三花五子丸岩電丸聚寶散拂手散退翳散白翳黃心鷓鴣天翳如梅片白如銀一點微黃在翳心大小眥頭微赤色或時澀痛淚淋淋肝肺毒熱風侵覆盡烏珠不見輪若服數帖還睛散管取安然病不臨此是肝腎熱毒也宜服三花五子丸岩電散拂手散聚寶散退翳散黑花內障鷓鴣天黑花翳狀眼多青此病根源在腎經飲食不貪常口苦此名膽氣熱風停如斯證不為輕等閒服藥未為寧涼膽丸服要補腎許見三光日月星此是肝熱腎虛也宜服三花五子丸逐血散二地散活血散小兒胎患內障鷓鴣天小兒內障甚難醫始生燈下見光稀行步不分南共北瞳仁潔白怎扶持胎受熱是根基延年真個性情恓縱命醫者空施藥將養為佳實可悲此是肝熱也此疾難醫也宜服羚羊角散還睛丸夢靈丸穀精丸五風變內障鷓鴣天五風內障病何孤青烏緑白黑糊塗變成內障來遮目物物難分眼赤舒瞳仁大淚有無頭痛腦痛疾難除鎮心止痛靈丹藥要見三光這世無此是色欲過度腎虛敗血氣皆虛也宜服三花五子丸拂手散鎮肝散岩電丸雷頭風內障鷓鴣天忽然被打觸成冤變成內障淚漣漣赤腫侵睛為病久三光不見苦憂煎雷頭證豈安然住疼止痛莫依先若要見光何日得再逢元化也哀憐此是上熱下虛故生此疾也難療宜服三花五子丸勝金丸石蟹散鎮肝丸還睛散驚振內障鷓鴣天驚振內障閃珠移熱毒衝入眼中居牽引瞳仁為反背致令暗昧不知時心無靜肝膽虛名為驚振步須遲等閒不服靈丹藥針灸令人無所施此是腎風熱毒上攻又且血氣凝滯有傷瞳仁也此證難治宜服三花五子丸活血散還睛丸緑風內障鷓鴣天緑風初患有頭旋兩額相牽痛不痊鼻梁隔乃時時痛紅白花生在眼前肝左熱肺右邊或時兩眼淚漣漣決明散與羚羊散服了光明玄又玄此是肝虛勞頭痛也宜服三花五子丸川芎散鎮肝散勝金散烏風內障西江月烏風障生已定全無翳障生花或時癢痛似云遮漸漸昏暗無假此候肝經氣盛須知實熱侵加瀉肝散服是生涯通了分明後雅此是肝熱或痛久而不治時見飛花宜服夢靈丸三花五子丸鎮肝散黑風內障西江月黑風病起何因腎胃風熱相侵緑風形證別無分時有黑風相趁若要分明刮決羚羊角散為憑還睛散服妙通靈醫士馳名已定此是腎虛生內障也宜服三花五子丸二地散拂手散青風內障西江月青風眼候如何不疼不痛由他瞳子安然如不患卻有頭旋害我漸有花生上下後勞昏暗增加還睛散服不為佳羚羊角散兼和此是腎虛勞也此疾難治也宜服還睛散鎮肝散二地散肝虛雀目鷓鴣天雀目生來甚惱情小兒患此曰疳名肝臟虛勞為此病點燈時分沒光明花亂起或頭痛年深不料害雙盲初患之時須服藥倦醫不療暗雙盲此是肝虛勞也久則難治也宜服三花五子丸鎮肝散還睛散人參散高風雀目鷓鴣天高風雀目證同前形狀其間有異偏才到黃昏昏不見經年瞳子似珠圓高風候古今傳莫貪口味色心牽靈丹妙藥能醫治便是人間快活仙此是肝虛勞也此疾難治宜服三花五子丸鎮肝散還睛散夢靈散肝虛雀目暗鷓鴣天肝虛要識病來因遠視近視不光明眼前不見如煙霧一物看來二物形肝虛熱定心情補肝散服若神靈調持保護須知己莫使勞神眼又盲此是肝氣虛勞難治也宜服三花五子丸鎮肝散磨鏡丸還睛散二地散肝臟積熱鷓鴣天肝臟積熱疾生多睛疼怕日淚成河翳膜漸生加澀痛皆因勞力用心過患雙眸不能瘥熱風邪氣奈如何決明散服方才好莫若涼肝把氣和此是腎氣虛敗故生此疾而肝熱宜服密蒙花散還睛丸金叉丸磨鏡丸傷寒熱病鷓鴣天傷寒安後患雙眸赤腫生翳病多由嗜食五辛多受毒上攻雙目淚如流開澀痛閉不休決明散服不須憂頻頻膏用黃連點醫士參詳療必瘳宜服聚寶散拂手散鎮肝散岩電丸夢靈散混睛內障鷓鴣天混睛內障證如何有淚迎風冷淚多白睛腫赤難開視或時好了又來磨治毒熱莫差訛漸生膜障為蹉跎病者早服地黃散兩目光明見日羅此是傷濕內熱也宜服活血散聚寶散密蒙花散鎮肝散胬肉侵睛鷓鴣天胬肉侵睛憂慮多眥頭赤爛為揩磨如雲赤障橫遮過勞神太過為蹉跎傷肝氣熱風磨更加癢痛疾難瘥定心丸子須為美手法治之妙不過此是脾風熱也宜服拂手散清肝散岩電丸南硼砂點兩瞼黏睛鷓鴣天兩瞼黏睛赤爛眩等閒不治已經年翳膜遮珠因血熱憎風流淚古今傳消風散沉疴痊除風去血得安然黃連為末煎湯洗免得終朝眼疾纏此是脾風內熱故有此疾也宜服涼肝散四物湯岩電丸槐花散宜手法治之愈也膜入水輪鷓鴣天膜入水輪甚不宜瞳仁昏暗實堪悲障膜兩眸如火熱皆因色欲過多為如斯證急求醫滋陰降火散為奇還睛鎮肝散宜服莫待青盲悔是遲此是邪毒熱侵腎經也宜服三花五子丸鎮肝散二地散夢靈散丁翳根深西江月丁翳根深病老肝心滯熱不好致令疼痛淚雙垂突出如釘釘腦晝夜不分黑白似漆如煙難掃仙方妙藥任施為再要復原難討此是久蘊熱毒在心經也不可治宜服蒺藜散聚寶散木賊散黑翳如珠西江月黑翳羞明惟目受病疼痛哭泣腎虛受熱致生來形黑又如豆粒此疾無淚流兮點藥不須用力補腎丸子要相投羚羊角散無失此是腎經虛勞受熱也宜服三花五子丸鎮肝散二地散人參散花翳白陷西江月花翳旋繞瞳仁點點如花如鱗砌成白陷不須嗔肝臟積熱已定酒後行房共枕嗜食煎炙茹葷先將藥餌涼肝經羚羊角散保命此是肝經熱毒也宜服聚寶散撥電散岩電散拂手散密蒙花散冰翳瑕深鷓鴣天瑕深冰翳日昏光青色沉沉證不常瞳子時時疼痛甚日當午後稍安康五臟熱受其殃清涼散最為良點洗莫離真口訣管教醫士姓名揚此是腎氣虛敗也宜服三花五子丸人參散岩電散鎮肝散玉翳浮睛鷓鴣天玉翳堆起白如霜浮痛根源不可當不疼不痛難療治不紅不腫少斯殃淚頻出怕窺光還睛散服漸安康好將藥餌頻頻服此病寬心得久長此是肝經受熱也宜服聚寶散拂手散除翳散偶因他患後生翳西江月偶因他患不覺倏爾衝於輪廓朦朧漸漸翳來侵只見瞳仁白膜豈能觀看分明且把閒愁捺落鎮肝丸散見功勞難把金針除卻此是肝經氣虛也宜服撥雲散拂手散聚寶散岩電丸逆順生翳西江月逆順生翳為名澀疼令人淚傾上而生下裹瞳仁此證名傳逆證自下生上為順兩翳交加已定羚羊角散見分明點洗依方必應此是臟腑虛熱也此疾久則難治也宜服三花五子丸羚羊角散羌活散拂手散雞冠蜆肉鷓鴣天胞肉生如蜆肉形雞冠紅色甚分明或青或黑鬚番看痛苦難禁兩淚傾甚怕日又羞明原因客熱在脾經寬心多服石明散活血調和致太平宜服岩電丸活血散密蒙花散羚羊角散瞼生風粟鷓鴣天粟米瘡生兩瞼中醫來盡是爛眩風或多或少全無數大而兼細不相同脾積熱賊風攻或針或烙去瘡風驅風散與消風散醫士參詳定有功此是脾經受賊風邪熱也宜服防己散活血散聚寶散拂手散胞肉凝脂鷓鴣天胞肉凝脂不易平皆因心熱苦相刑致令胞腫如桃李疼痛時時熱淚傾清心火得安寧消風散血漸光明更宜手法加針烙莫使邪風劫眼睛此是脾經受風熱也宜服三花五子丸聚寶散羌活散漏睛膿出鷓鴣天漏睛膿出苦離宮心火炎炎熱毒攻氣滯停留於眥畔結成膿血出無窮經日久甚為凶眼珠倏爾落胸中白薇丸及洗心散服了教君熱毒通此是心經脾經熱毒相攻也宜服三花五子丸鎮肝散羌活散蟹眼睛疼鷓鴣天水輪如豆復烏珠蟹睛蝦眼兩無殊肝腎虛疼因客熱至能損目要知乎淚不止證難除補肝補腎兩相扶醫人活法在眼法藥不執方眼不辜此是肝虛熱痛也此疾難治也宜服桂枝湯防風散勝金散突起睛高鷓鴣天五臟停留風毒纏致令突起眼珠懸膽虛故有如斯證淚流腫痛夜無眠息嗔怒莫憂煎洗肝散服似神仙砂糖一塊酸車草入藥調和眼亦痊此是肝腎邪熱也宜太陽貼藥宜服消風散逐血散勝金散風牽喎斜鷓鴣天淚出頻頻眼角偏或時斜跳是風牽致令昏暗全無翳不知不覺病來纏如斯證要醫痊全憑藥餌得安然消風散服多靈驗莫使喎斜誤少年此是脾經受邪熱也此疾久則難治宜服夏枯草丸三花五子丸鎮肝散拂手散倒睫拳毛鷓鴣天倒睫拳毛碎眼皮通肝散服可為奇防風散劑常宜服翳膜除之又不離補肝散決狐疑更將手法請君知剪夾洗塗須云好何如艾便洗相宜此是脾臟受熱也宜服防風散黃連膏點用童便煎蘄艾露過一夜臥時洗眼其拳毛自伸風牽瞼出鷓鴣天風牽瞼出要參詳太陰脾毒被風傷來纏雙目無時住卻留瞼內作斯殃紅赤色少安康但將五退散為良若有紅淡黑煤色豈能除患莫思量此是脾經肝經虛勞也此是風邪干經絡難治宜服三花五子丸還睛散聚寶散宜灸風池穴太陽角神祟疼痛鷓鴣天居常無疾得安然忽爾如油似火煎太陽掣痛如針刺早輕晚重淚漣漣神鬼禍甚難言信之則有也能痊何如一服洗肝散頃刻除邪祛病根此是神祟為禍頭痛目赤是心肝有邪熱宜服還睛散防己散洗心散瀉肝散旋螺突起鷓鴣天人生在世目為先最貴全憑水火全率爾睛疼多淚出腎虛肝熱賊風纏紅赤障旋螺弦白睛突起毒之愆洗心散及瀉肝散管取依然夜得眠此是肝經熱也腎經虛熱也宜服活血散洗心散洗肝散此疾久則眼出膿血人面黑色如鐵者不可治宜用藥貼太陽鶻眼凝脂鷓鴣天鶻眼凝脂是病胎臟中有熱故安排舉目視瞻輪廓硬抬頭澀淚藥難諧空嘆息莫傷懷好將臟熱細分開若教信卻金針刺未福先殃再受災此是肝臟受熱也此疾不可治也宜服還睛散鎮肝散勝金散轆轤轉睛鷓鴣天轆轤轉睛是肝風熱積生成此疾凶雙目轉動無安靜臟神邪氣患雙瞳轆轤轉邪氣攻世醫有藥妙難通了得箇中端的意除非盧扁再相逢此是肝經風毒也此病多難治也宜服還睛散聚寶散岩電丸撞打破傷西江月撞打破刷刺差疼痛甚則風加朦朧看物事如麻驚震瞳仁休耍敗血赤腫不散地黃薑汁為佳太陽貼藥痛方瘥四物湯服無價此是撞打賊風故血腫也瞳仁碎作兩邊不可治但能以藥散血止痛宜服四物湯活血散逐血散撞刺生翳鷓鴣天人世雙眸要保全忽然撞刺不由言腫痛霎時生翳障更添風熱淚漣漣須早治莫遲延生黃桃柳貼眼眩用藥不離真口訣醫家有效妙通仙此是客風入眼生熱翳也宜服逐血散活血散宜貼太陽穴血灌瞳仁鷓鴣天瞳仁被血灌其中皆為勞神氣血攻全無翳膜難分別痛如針刺血難通肝氣閉病來凶紫則皮使酒煎濃木通丸藥須吞服四靈活血妙無窮此是肝經病也虛熱又腎虛熱也宜服鐵柱散逐血散活血散太陽宜貼藥眛目飛塵鷓鴣天眛目飛塵證要明風拂飛塵入眼睛黏定雙睛生赤腫致令瞳子不非輕痛而淚莫遲停鵝涎調末藥名罌更將京墨拖筋膜莫把尋常眼類評此病忌客風入目也若是麥芒入眼煮大麥汁洗之新鵝涎點之亦愈若無物眛目乃肌肉消瘦不能為肥膚外感風邪乃脾之毒也宜服活血散連翹散天行赤眼鷓鴣天天行赤眼是瘟邪澀痛瞳仁肝熱加風毒又沖生翳障洗肝散服便光華紅赤淡涼為佳洗心去血乃為瘥太陽刺血何為巧點藥先時也有差此乃是肝經受邪客熱也宜服消毒散涼肝散活血散暴赤生風鷓鴣天心肝邪熱不相通血氣相爭痛不容暴赤生風生翳膜令人瞻視淚無窮巡五臟洗肝風心經君火莫興隆等閒莫把手頻拭免有拳毛膽氣逢此是肝經受風熱也宜服防風散洗心散消毒散胎風赤爛鷓鴣天小兒出世只由他沐浴不潔愛之差養至一周三五歲雙眸赤爛忌風邪多癢痛度年華消風去血妙堪誇碧霞散洗還睛服風爛應教漸漸瘥此是胎毒生白障淚流眼弦赤腫爛宜服岩電散活血散黃連膏點風赤瘡痍西江月兩瞼赤似赤霞瘡痍熱是風邪久而不治翳來遮無計可治疾罷好把碧霞散洗醫人妙手堪誇黃連膏點得其瘥眸子依舊無瑕此是脾經有熱受風邪也宜服驅風散消毒散宜手法針烙治之也痛如針刺鷓鴣天痛如針刺不非輕只因積熱在心經澀滯難開並不睡腫如桃李淚溋溋洗肝散若神靈漸漸災消得太平太陽穴畔須針刺去血教君眼復明此是肝經熱毒風邪也宜服洗心散洗肝散消毒散活血散癢極難忍鷓鴣天輪廓因風邪氣攻致令雙手拭睛瞳眥頭瞼畔睛珠癢此證分明為賊風驅風散妙無窮好將井水蜜調同飲罷心肝情意朗風邪熱毒去無蹤此是心脾風邪熱也宜服還睛散消毒散秦皮散驅風散坐起生花鷓鴣天坐起生花似碎星頭旋目暗耳虛鳴要知此證因何得腎臟誰知客熱停戒房色質言呈息心定意免災生補肝補腎還睛散出入教君眼復明此是心虛如水洗過一時無糞不久宜服三花五子丸鎮肝散還睛散岩電散瞳仁幹缺鷓鴣天瞳仁幹缺甚為疼風熱須知在腎經此症水輪無淚液三光難辨眼多盲息色欲使心清藥將補腎補肝平病者服藥須宜早莫待朦朧眼不明此是腎風內熱也宜服三花五子丸鎮肝散還睛散岩電丸益腎丸黃膜上衝鷓鴣天黃膜下生攻上輪猶如脂膜覆瞳仁疼而又淚難禁忍脾胃多停熱毒侵慎口味莫生嗔好將犀角服殷勤不痊更服六神散兩目光明去膜云此是脾胃有毒熱也宜服聚寶散防風散拂手散赤膜下垂鷓鴣天赤膜上生人怎知初時得疾甚蹺蹊澀痛流淚多紅障怕日羞明膜下垂難禁忍熱風欺心經脾熱瀉為奇通肝散藥須頻服髮際上星穴可知此是脾經內蘊熱也宜服岩電丸洗肝散通肝散小眥赤脈西江月小眥赤脈中生交加漸漸遮睛久停風熱在心經昏暗卻來爭競病者洗心滌慮三焦血滯不行故生風氣惱人情犀角飲能治症此是心經有熱也宜服活血散洗心散消毒散瀉肝散小兒雙目通睛西江月小兒肝受驚風雙目故此睛通欲觀西處又觀東無時徘徊視弄此疾心受邪熱牛黃膏子可用必須退熱顯醫功眸子依然不動此是心經有邪熱也宜服涼肝散逐血散聚寶散岩電散小兒胞肉生瘡西江月兒童胞肉生瘡臟腑風熱為殃痘瘡毒氣眼朦朧淚出如流膜障瞳仁只要不損菟絲子丸能昌龍蛤草散妙無量敗毒柴胡先用此是肝經風虛熱也宜服活血散防己散岩電散聚寶散小兒睛中生贅西江月贅粒初如麻子日久常似豆懸常將手拭度流年痛而淚出脹瞼有此脾經風熱肝臟毒積攻眼莫教把眼等閒看變成石榴大患此是肝經風邪熱毒也此疾難治死者有之初起宜急服藥可也宜服聚寶散夏枯草散穀精草散小兒疳眼西江月澀癢初生瘡翳久而疼痛難開致令兒子哭悲哀頭熱肝風目眛怕日憎光淚落皆因瀉利生來小兒疳眼又難諧還睛散能除害此是肝虛勞也宜服聚寶散還睛散活血散黃連散蘆薈散小兒青盲西江月提起自傷悲嘆那懷孕時堪贊五辛口味不能停産後令兒難盼或時嘔吐黃酸兩目瞳仁盲貫致令肝熱受其殃作定青盲難散此是肝經風熱也或因病後亦變此青盲反背瞳仁也此證多嗜五辛難治宜服三花五子丸鎮肝散暴赤生熱鷓鴣天暴風客熱疾須知此候生時淚若悲兩眥赤脈頻頻癢疼痛如針實慘悽肺風熱肝經疲醫人變動任施為洗心涼肝方莫錯硼砂樟腦用相宜此是心經有客熱也宜服洗心散洗肝散迎風流淚西江月參祥淚痕流眼肺虛能起飛花出入甚畏賊風加拴定心猿意馬獨怕冷風灌目腎虛補藥為佳清肝散服是醫家宴樂西江月下此是肺經虛也宜服還睛丸楮檳丸補腎丸瞼硬睛疼鷓鴣天怕日羞明熱淚傾瞼皮紅腫硬無情不堪疼痛無時癢肝臟風邪熱毒生通肝散效神靈三朝翳膜退如星宜用手法施針烙大都合谷與淵澄此是脾經風熱也宜服消毒散驅風散逐血散
