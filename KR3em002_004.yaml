body:
  text: 卷四治眼方治心間有熱眼有赤脈血灌瞳人方玄參不拘多少為末米泔水煮豬肝入藥末在肝內細嚼用乾薑湯送下治爛眩風眼一夜洗三四次陳霜梅三個銅錢三個黃連三分用水半鍾洗眼皮糖煎散治風毒氣攻眼赤腫視物不明隱澀難開龍膽草防己大黃當歸荊芥穗甘草防風川芎赤芍藥水煎入砂糖一塊同煎服治雀目眼方夜明砂蛤粉上各等分為末每服二錢用豬肝三指大批開入藥於肝內用麻線扎定用陳米一合同煮熟空心服蛤粉丸治雀目蛤粉黃蠟上各等分溶化如棗子大入藥和蠟成丸用豬肝二兩批開入丸於肝內麻線扎定瓷器內煮熟熏眼溫服豬肝丸治雀目痘眼全不見者有效穀精草蛤粉夜明砂上各一兩每服三錢用豬肝一片重二兩批開摻藥於內麻線扎定米泔水煮熟待涼臨臥細嚼又用豬肝汁咽下忌生冷油麵熱毒之物治雀目方夜不見光茯苓石膏各一兩豬肝尖七葉老米半升共浸一時略炒悶飯吃五六七次即有效矣治眼赤腫疼痛方北細辛當歸黃連赤芍藥龍膽草上各等分㕮咀水煎入砂糖少許同煎服雙劍散治赤眼有效青黛乳香各一錢𥓒硝五分上各等分為末調水吹入鼻中有效搐鼻散治火眼立效皂角鵝不食草芒硝荔枝殼上各等分為末患者先含水一口後以藥搐鼻中神效吹鼻散退翳定疼痛苓苓香藜蘆丁香甘松香川芎各一兩藿香五錢上為末少許吹入鼻中搐鼻方治風熱腫難開雄黃水透過辰砂各二兩細辛二錢冰片少許麝香少許上為末先口含水以藥搐鼻中生地黃湯治眼痛極漢防己生地黃熟地黃上各等分水煎服二地散治眼赤腫地骨皮一兩菊花一兩川芎五錢黃芩二兩赤芍藥一兩黃柏二兩熟地黃三兩酒浸上㕮咀加荊芥燈心同水煎服聚寶散治風毒熱眼當歸大黃煨黃連龍膽草赤芍藥甘草荊芥菊花牛蒡子薄荷上各等分水煎服防己散治熱風毒去濕氣梔子防己地黃赤芍藥當歸龍膽草上各等分為末每服二錢酒調下鐵柱散平補去風此方治虛血灌瞳仁肝經之疾訶子防風梔子甘草紫金藤石斛川芎當歸荊芥上各等分為末米湯送下蒺藜散止淚此方原傳吳宅蒺藜甘草防風各五錢羌活一兩上為末米泔湯送下細辛散防風毒流淚不止細辛川芎各一兩菊花桑白皮旋覆花石膏蒼朮各一兩蒺藜二兩上為末木賊煎湯送下細辛散治眼睛打傷有妨瞳仁睛疼出血荊芥穗茯苓車前子地骨皮細辛沒藥各二錢上為末空心溫酒調下住淚散治淚不止者甘草木賊蒺藜夏枯草生地黃梔子牛蒡子上各等分㕮咀水煎溫服防風散本教云可常服妙治産後喜怒不常或憂思見淚出過多變成眼疾昏暗爛眩疼痛又治四五十歲者大黃甘菊花甘草石決明薄荷荊芥川芎防風草決明牛膝羌活鬱金上各等分為末每服二錢訶子煎湯下枸杞子煎湯送下防風散治風毒攻眼拳毛倒睫止痛甘菊花防風黃芩黃連甘草草決明大黃木通赤芍藥上各等分水煎服川芎散治眼頭痛川芎防風木賊石決明白蒺藜羌活蒼朮荊芥旋覆花香白芷山茵陳楮實子石膏夏枯草草決明各二錢薄荷一兩香附子甘草蟬蛻去頭足各一兩蛇蛻五錢油浸炒菊花上為末每服二錢茶清食後服川芎散治頭疼眼痛甘菊花赤石脂荊芥旋覆花川芎上各等分為末每服三二錢蔥湯調食後服消毒散荊芥五錢牛蒡子一兩大黃甘草一兩上㕮咀水煎溫服消毒飲防風甘草荊芥牛蒡子連翹蒼朮赤芍藥上各等分㕮咀水燈芯同煎五退散蟬蛻蛇蛻豬蛻穿山甲蠶蛻荊芥防風甘草石決明雄黃草決明上各等分為末鹽湯送下經效散黃芩大黃當歸北柴胡犀角甘草白芷赤芍藥五錢上等分㕮咀水煎溫服罌粟丸罌粟三錢上為末又用鵝涎調藥貼眼眥邊治眛目飛塵入眼及麥芒入眼者碧霞散銅緑土膏五錢輕粉麝香俱少許上為末頓水洗眼去風驅風散川芎羌活防風石膏一兩川烏荊芥蟬蛻上各等分為末每服三錢薄荷煎湯送下或茶清亦可二宜散治胎前産後風眼與檀香散北柴胡茯苓黃柏黃芩枳實甘菊花甘草熟地黃上各等分㕮咀水煎溫服當歸散當歸甘草菊花熟地黃川芎防風蒺藜蟬蛻赤芍藥草決明上各等分為末訶子煎湯下胎前産後宜服當歸散治老幼虛實通用甘草荊芥五錢當歸二兩酒浸洗赤芍藥二兩白芷防風川芎二兩熟地黃一兩酒洗上㕮咀水煎服四靈散治血灌瞳仁大黃朴硝生地黃沒藥上各等分為末溫酒調下六神散治傷寒後及麻痘時行赤眼熱毒食毒腫痛不開大黃黃連防風赤芍藥甘草當歸五錢上㕮咀水煎溫服菊花散仁齊方云治肝受風毒眼昏暗翳障並治之甘草二兩炙甘菊花四兩白蒺藜炒搗去刺羌活荊芥穗木賊去節童便浸過一宿蟬蛻去頭足各三兩上㕮咀水煎服為末每服二錢茶清送下菊花散治熱眼常用防風菊花蔓荊子枸杞子甘草白芷川芎密蒙花五味子羌活白蒺藜上各等分為末茶清送下或酒調下白芷散治頭痛眼疼石膏川芎川白芷藁本細辛上各等分為末燈芯湯送下三花五子丸密蒙花旋覆花菊花各五錢決明子枸杞子牛蒡子菟絲子酒浸蒸熟搗爛焙乾地膚子甘草上各等分為末蜜為丸如梧桐子大每服五六十丸麥門冬湯送下七子丸治腎氣上攻肝虛膽盛漸生障膜不見光明者天麻子又云是火麻子可考當歸萊蔔子決明子青葙子菟絲子車前子荊芥子上各等分為末蜜丸又用當歸生地黃研爛和藥為丸每服三十丸空心鹽湯吞下黃芩散治熱毒赤腫痛澀難開黃芩天花粉菊花荊芥淡竹葉川當歸上各等分為末砂糖訶子煎湯調送下黃苓散治腎氣虛弱上攻目昏暗澀痛及生胬肉侵睛皆治之黃芩白蒺藜荊芥各一兩蟬蛻去頭足羌活蛇蛻油浸炙上各五錢為末麝香調酒送下明目丸玄參密蒙花上各等分為末糊丸荊芥湯或菊花煎湯送下人參散人參木香茯苓附子各五錢炒玄參木賊鬱金細辛車前子麝香樟腦青葙子上為末用豬胰切片子入椒鹽少許炙焦溫酒送下木賊散木賊乳香細辛烏頭炒白芷石膏寒水石二兩煅上各等分為末每服二三錢茶清送下佛手散治腎虛風毒氣赤眼木賊去節天仙藤黃連黃柏蒼朮甘草石決明香附子上各五錢為末赤眼砂糖水煎服腎氣風毒茶清下氣眼訶子湯下槐花散治頭疼眼痛不止者槐花龍膽草茯苓山梔子上各等分為末每服兩錢砂糖水調下荊芥散治頭風眼症殭蠶川芎旋覆花防風菊花石膏半夏羌活白芷上各等分為末蔥湯茶清調下荊芥湯治一切赤腫眼牛蒡子一兩炒蒼朮五錢米泔水浸防風一兩槐花荊芥各一兩菊花五錢甘草一兩大黃三錢木賊石膏各五錢龍膽草五錢草決明一兩上㕮咀水煎服為末臨臥時米湯下亦可密蒙花散治諸般眼病遠視不明見物稀依黑白不分明本教云最治風有效羌活密蒙花石膏木賊防風甘草石決明蒼朮蒺藜荊芥蔓荊子上各等分為末訶子煎湯下赤澀砂糖水下密蒙花散治諸毒痘瘡眼密蒙花青葙子決明子車前子上各五錢為末用生薑一塊破開作三片摻藥入內合成一塊濕紙包七重灰火煨熟空心服防風散治酒毒眼防風蒺藜甘草上各等分為末每服二錢酒調送下羌活散治一切眼疾頭風證羌活白蒺藜防風川芎石膏荊芥甘草上各等分為末每服二錢酒調服或茶清下羌活散治眼赤腫翳障羌活大黃煨密蒙花甘草炙蒺藜荊芥木賊草決明蟬蛻炒去頭足菊花薄荷黃芩生地黃黃連當歸淡竹葉防風赤芍藥各等分上為末訶子湯下赤腫梔子湯下翳障木賊湯下羌活散治男婦病毒氣上攻成赤眼或食毒或障膜羌活防風黃連升麻地骨皮玄參川芎柴胡桔梗石決明細辛黃芩淡竹葉上各等分為末每服二錢蜜糖水調下蔓荊散治眼赤腫痛密蒙花甘草石決明蔓荊子包煨草決明白蒺藜蟬蛻淡竹葉蛇蛻燒薄荷二兩酸棗仁五錢上為末每服二三錢薄荷湯下竹葉散治眼疼痛骨節熱散血黃芩天竺黃胡黃連朴硝青蒿五錢蟬蛻一兩甘草五錢大黃煨五錢側柏葉炒五錢上為末訶子湯下小兒翳熱金環薄荷湯下胬肉散治胬肉侵睛密蒙花菊花穀精草車前子黃連羊肝子朴硝淡竹葉羚羊角黃芩甘草蔓荊子上各等分為末每服二錢茶清或米湯調下退頂散治頭疼目腫青黛五錢樟腦少許麝香少許上為末搐鼻中透頂散退赤眼翳障凌霄花鬧羊花苓苓香上各一錢為末少許搐鼻中退翳光明散木賊菊花上㕮咀水煎服又用藥為末水泡洗眼三五次愈透光散治氣虛弱頭風冷熱昏疼生翳障甜瓜子地骨皮牡丹皮蟬蛻黃芩龍膽草白朮蒼朮菊花上各等分為末每服一錢荊芥湯下神應回光散治翳障赤眼胬肉侵睛攀睛青葙子木賊白芷甘草蟬蛻楮實子草決明石決明羌活川芎白蒺藜上各等分為末每服一錢食後茶清或酒下俱可二草散治膀胱或左或右有冷氣上攻眼目赤腺橫睛作痛夏枯草二兩木賊一兩甘草五錢上為末每服一錢薄荷煎湯下或茶清亦可金鈴散治膀胱冷氣上攻眼目昏澀茴香枳殼去穰破故紙炒金鈴子芎須一兩茯苓川芎炮上為末每服一錢木通黃連生地黃茴香煎湯下酒下亦可茯苓散治老人赤眼不退茯苓人參赤芍藥梔子甘草麥門冬藿香瞿麥各二兩連翹三兩上㕮咀水煎服黑神散治婦人血風爛眩或産後月水不調痛不可忍撞打血攻瞳仁散血行風孕婦不可服茯苓甘草茴香肉桂生地黃川芎蒲黃木香白芷玄胡索當歸赤芍藥上各等分為末每服三錢酒調下煎亦可茶調散治婦人男子風腫癢痛翳障爛眩氣眼流淚昏暗川芎石膏炒防風石決明羌活木賊甘草五錢薄荷甘菊花上各一兩為末每服二錢茶清調下夢靈丸附子煨川椒酒浸山藥茴香各一兩青鹽五錢黃耆一兩上為末用豬腰子一副研爛麵糊為丸每服三十丸荊芥煎湯調下酒亦可錦鳩丸石決明白朮防風石膏煅蒺藜炒青皮甘草蟬蛻青葙子旋覆花白殭蠶蛇蛻川芎車前子羌活木賊各二兩人參五錢上為末蜜丸如彈子大細嚼青皮煎湯下如爛眩訶子湯下治男婦老幼諸般翳障血灌瞳仁淚出不止赤筋侵睛大雷丸治氣眼淚出木賊二兩去節防風川白芷草決明炒輕粉炒蒼朮制過荊芥夜明砂上各等分為末糊丸薄荷煎湯下茶清下亦可蘆薈丸治眼腫蘆薈甘草牛膝柏子仁細辛人參羚羊角上各等分為末蜜丸每服二十丸茶清送下岩電丸治婦人血風爛眩眼川芎香附子防風甘草細辛杏仁枸杞子蒼朮荊芥蟬蛻炒去頭足菊花赤芍藥上各等分為末蜜丸鹽湯茶清俱可下每服十五丸夏枯草丸治眼睛痛川芎菊花石膏夏枯草香附子五味子上各等分為末蔥研爛取汁為丸每服十三丸燈芯煎湯下天麻丸治大人小兒婦人風熱氣攻眼昏暗赤澀胬肉生瘡翳膜久患偏正頭痛目小淚出常夾腦風疼多見黑花天麻南星川芎旋覆花藁本羌活青皮黑牽牛上各等分為末生薑汁為丸每服三十丸鹽湯下蔥白丸治腎虛多昏視物不明菟絲子酒浸二兩肉蓯蓉一兩五味子車前子二兩肉桂蒼朮五錢乾薑泡磁石一兩煮煨上為末蜜丸如梧桐子大鹽湯送下補腎丸巴戟山藥青鹽破故紙小茴香牡丹皮五錢蓯蓉枸杞子五兩上為末蜜丸每服三十丸空心鹽湯送下定心丸石菖蒲枸杞子五錢甘草辰砂一兩遠志一錢茯神一兩麥門冬一兩上為末蜜丸燈芯煎湯送下白薇丸白薇防風羌活石榴皮白蒺藜生地黃上各等分為末蜜丸枸杞子煎湯送下遠志丸治丁翳經年遠志人參白茯苓柏子仁細辛五錢茺蔚子草決明二錢車前子上為末蜜丸米湯下遠志丸仁齊云清心益肝明目退翳人參蘆薈研茯苓琥珀研蔓荊子各五錢川芎生地黃