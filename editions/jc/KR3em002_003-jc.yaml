經出被風吹赤爛眼弦甘草防風地骨皮黃連菊花當歸川芎赤芍藥荊芥黃芩上各等分為末每服三錢溫酒調下小兒痘疹小兒痘疹後毒氣攻目致生翳膜及下元赤白痢疾枳殼甘草黃連草果肉豆蔻當歸上各等分水煎服通神效不可瀉治小兒痘疹及眼生翳障白菊花綠豆皮穀精草上各等分為末每服一錢用乾柿一枚米泔一鍾同煎待水乾不拘時服乾柿七日後見效重者半月見效小兒痘疹入目生翳膜瘴草決明甘草天花粉赤芍藥上各等分為末每服五分熱水化蜜湯調服小兒周年半歲患赤眼者黃連為末茶調敷手心如痛難開加薑黃皂角朴硝上為末一同貼太陽穴即愈小兒癍瘡患後睛上有膜白蕪荑五十個去皮蘆薈三錢熊膽三錢蕤仁二十五個去皮研細香油三兩調勻攤碗上次用熟艾一塊如雞子大又用硇砂乳香砒霜三味各如綠豆大研入在碗內同艾燒煙燻碗內藥艾盡為度取出剖下藥研細每用如粟米大點在眼中即有神效凡小兒痘疹後毒氣攻目或翳障赤筋隱澀腫痛流淚羞明難開並宜洗心涼肝取瀉有效磁石丸治肝腎虛蟹眼睛痛黃耆紫巴戟肉蓯蓉酒浸覆盆子青鹽人參附子木香沉香防風牛乳牛膝肉桂熟地黃乾薑遠志茯苓磁石大腹皮蒼朮陳皮白朮川芎檳榔白芷青皮烏藥獨活上各等分為末蜜丸每服三十丸鹽湯送下磁石丸治肝腎虛眼暗視物不明肉蓯蓉酒浸五味子菟絲子照前制度車前子三兩蒼朮五錢乾薑肉桂磁石上各等分為末蜜丸每服三十丸鹽湯送下乳香丸治男婦頭疼眼痛筋骨痛甚妙乳香沒藥五靈脂木鱉子烏藥夏蠶砂上各等分為末酒糊丸每服七丸薑汁茶清送下乳香散杏仁去皮尖酸棗仁二兩人參乳香郁李仁各五錢上為末每服二三錢溫酒送下乳香丸治眼風毒不開全蠍七個殭蠶十四個白芷烏頭十九個蓽茇二十一個胡椒四十九個乳香沒藥麝香細辛良薑上各等分為末蜜丸每服三十丸鹽湯送下藿香散一名金丸治時行赤眼退翳障隱澀難開藿香麻黃去節白芷石膏三兩煅上為末荊芥湯茶清可下檀香散荊芥檀香石膏大川烏川芎白芷甘草香附子上各等分為末蔥湯送下如不便茶清亦可磨翳散治冷翳不痛不腫黑睛上生蔥花名曰怒氣傷肝黃連龍膽草赤芍藥防風當歸梔子生地黃熟地黃桑白皮上各等分㕮咀水煎如痛加淡竹葉去肝熱如口乾加燈心如腫加大黃砂糖後服穀精草治風翳穀精草夏枯草木賊青葙子石決明羌活白蒺藜菊花淡竹葉上各等分㕮咀水煎服穀精散治翳防風穀精草上各等分為末每服二三錢空心米湯送下除翳散黃連三錢秦艽甘草梔子決明子以上三錢赤芍藥大黃各五錢炒川芎一兩車前子上為末淡竹葉燈心煎湯送下退翳散治風毒氣眼攀睛胬肉昏澀淚出黃芩蟬蛻炒去頭足各五錢蒼朮制甘草炙各五錢木賊一兩去節蛇蛻油浸酒洗一宿上為末每服二錢訶子煎湯送下磨翳丸平補眼疾熟地黃夜明砂少許黃芩草決明上為末蜜丸淡竹葉煎湯送下散血散歸尾大黃黃連赤芍藥芒硝黃柏旋覆花羌活牡丹皮獨活紅花川芎五加皮上等分水煎溫服散血散治赤腫難開當歸菊花石膏漢防己龍膽草茵陳朴硝旋覆花上各等分為末米湯送下食後服退赤散大黃黃芩黃連赤芍藥白芷梔子當歸桑白皮同水煎食後服退赤丸黃芩當歸白朮生地黃木通連翹甘草草決明上為末蜜丸每服四十丸淡竹葉煎湯送下逐血散黃連菊花防風赤芍藥黃芩梔子上各等分㕮咀用水煎溫服活血散治血毒眼梔子當歸菊花熟地黃牛蒡子大黃甘草細辛赤芍藥上各等分為末每服二錢酒送下退血散治白膜侵睛早晨冷淚白蒺藜荊芥麥門冬檳榔甘草羌活草決明上為末每服二三錢茶清化下四物湯治血熱內障加酒炒黃連黃柏當歸川芎白芍藥熟地黃上各等分㕮咀燈心同煎服貼眼藥退赤白蘞大黃黃柏白蒺藜蘇木紅花皂角上為末冷水調貼太陽貼眼藥治眼熱赤腫疼痛大黃白礬朴硝上為末水調作餅貼太陽瀉眼藥治一切積熱赤腫疼痛黃芩枳殼赤芍藥荊芥大黃朴硝五更空心服取瀉即效貼眼藥退赤眼毒熱桑白皮二兩大黃五錢荊芥五錢朴硝二兩上為末蜜水貼太陽穴以紙隔貼藥貼眼藥治撞打瞳人被血灌及赤腫頭風等證疼痛難忍皂角黃柏薑黃南星烏頭黃連上為末薑汁調貼太陽如撞打赤腫不開芙蓉豆粉生地黃汁雞子清調貼甚效貼眼藥治眼被打傷血灌瞳人大黃薑黃五倍子黃連黃柏當歸荊芥朴硝薄荷上各等分為末用生地黃汁調藥以紙隔貼藥在太陽穴即效貼眼藥治眼被打傷血浸睛梔子柳枝用生地黃捶爛調藥用紙隔藥貼太陽
