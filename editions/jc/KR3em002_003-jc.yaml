body:
  text: 卷三祖傳明目神方爐甘石要紅白色者為佳用黃柏當歸防風荊芥黃芩大黃羌活獨活各等分水煎煮煅甘石七次以火煅甘石以紅取出將藥水淬研得成粉為度硼砂水錢要通明佳膽礬火錢用刀面磨試即化為銅佳白礬金錢用白者佳冰片火錢要冰片者為佳硃砂木錢真紅明者佳麝香火錢當門子者為佳輕粉水錢芒硝土錢白丁香水錢用寺觀不犯雨淋者及夏月冬月者為佳沒藥木錢乳香木錢用石滴帶紅白潔佳空青水錢上藥依分兩逐一為末和勻用瓷罐收貯遇有眼疾點之神效又方甘石二兩童便煅七次散血乳香一錢火焙乾止痛沒藥一錢火焙乾止痛硼砂一錢去障膜硃砂五分去障膜膽礬五分去障膜熊膽一錢用筍葉包以文武火焙乾不可急麝香一分通孔竅硇砂五分將鐵器盛火煅煙盡為止去障膜輕粉三分干淚銅青五分去風乾淚冰片隨時加減太玄妙方治翳障遮睛並美黃柏二錢黃連石決明黃芩鬱金密蒙花石斛白芍藥防風荊芥川芎白蒺藜當歸地黃上藥為粗末以碗盛之水浸將樟腦放藥上用綿紙漿糊謹封碗口不要走氣以文武火煎之良久待冷去封藥上碗刮下樟腦以瓷罐貯之點藥數次其障膜即開也治眼五臟補瀉用藥瀉心藥大青葉黃連玄參黃柏雄黃朴硝連翹龍膽草麥門冬生地黃補心藥烏梅當歸遠志酸棗仁枸杞子山藥石菖蒲五味子茯苓柏子仁瀉肝藥菊花竹葉大黃黃芩犀角蟬蛻羚羊角龍膽草防己荊芥梔子石膏柴胡防風草決明升麻蔓荊子赤芍藥牛蒡子玄參槐花薄荷補肝藥熟地黃當歸大黃五味子五加皮白朮鹿茸薏苡仁肉蓯蓉瀉脾藥石膏梔子補脾藥陳皮麥芽青皮川芎附子白姜肉桂訶子神麯瀉肺藥桑白皮葶藶鬱金地骨皮白牽牛防風梔子白芍藥玄參牛蒡子補肺藥鍾乳粉白朮茯苓薏苡仁天門冬人參麥門冬白石英款冬花瀉腎藥當歸黑牽牛大戟郁李仁補腎藥杜仲破故紙巴戟菟絲子熟地黃青魚膽竹葉槐花鹿茸治眼方薄荷甘草共脂麻連翹當歸甘菊花白芷川芎枸杞子防風荊芥密蒙花等分將為細末飯後三匙卻用茶勸君日進三五次瞳人咫尺見天涯眼有紅障方生地黃五錢赤芍藥三錢歸尾一兩防風五錢白蒺藜五錢香白芷五錢羌活一兩薄荷不拘多少上㕮咀每服二錢水盞半燈心同煎食後溫服治青雲障方防風五錢蟬蛻四錢菊花三錢荊芥五錢草決明五錢黃連一兩澤瀉一兩細辛五錢羌活五錢獨活五錢上㕮咀水煎至八分食後服治眼常痛川芎五錢白芷四錢防風四錢赤芍藥五錢細辛五錢黃連五錢上㕮咀水煎食後服治爛眩風荊芥獨活蔓荊子防風各五錢黃連四錢蒼朮木賊夏枯草各五錢上㕮咀水煎食後服治眼常流淚木賊一兩夏枯草五錢香附子一兩荊芥一兩甘草一兩上為細末臨臥酒調下治眼常昏暗山梔子一兩荊芥一兩細辛五錢決明子蔓荊子菊花蒺藜五錢黃芩玄胡索蒼朮木賊防風上㕮咀水煎食後服治眼赤障歸尾川芎白芷黃連生熟地黃各一兩菊花澤瀉白蒺藜赤芍藥蟬蛻各五錢大黃一兩甘草三錢上㕮咀水煎食後服治眼白障黃連黃芩梔子決明子蔓荊子大黃蒺藜各一兩當歸甘草各五錢上水煎食後服灸眼法治眼痛不能視物上星穴其穴在鼻直上入髮際一寸陷中灸七壯仍先灸譩譆穴其穴在肩膊內兼第六椎骨下兩旁三寸其穴抱肩取之灸二七壯次灸風池穴其穴在顳顬髮際陷中與中府正相併耶是側邊相去各二寸治青盲無所見遠目中淫膚白膜覆瞳人灸巨窌穴其穴在鼻孔下夾水溝傍是也治目暗灸大椎下數至第十節當脊中灸二百壯甚驗也治風翳灸若患右目灸右手中指本節頭骨上五壯艾如小麥大患左目灸左手亦如之治卒生翳灸大指節橫紋三壯患右灸右患左灸左兼治不明淚出也治眼七十二證良方一問不開二問酒調散旋覆花荊芥穗蒼朮甘草菊花各等分為末每服二三錢酒調下鹽湯調下亦可四順散大黃川芎梔子朴硝赤芍藥枳殼以上各五錢生地黃三錢有氣加香附子有痛加沒藥白湯下八解散人參茯苓甘草陳皮藿香白朮厚朴半夏姜三片蔥一根煎服三問撥雲散羌活防風柴胡甘草各炒一兩上為末每服二三錢白湯下四順八解散見上洗心散當歸大黃赤芍藥甘草天花粉荊芥麻黃白朮薄荷豬苓澤瀉黃芩茯苓上水煎食後服瀉肝散薄荷當歸羌活防風大黃山梔川芎甘草菊花各等分上㕮咀水煎服四問洗肝補膽散當歸羌活蒺藜蟬蛻蛇蛻荊芥各二錢甘草七分為末酒調下活血散山梔當歸菊花熟地黃牛蒡子大黃甘草細辛赤芍藥各等分上為末每服三錢酒調下還光丸順肝散生地黃當歸大黃栝蔞仁上等分共為細末每服二錢食後新汲水調下黃耆丸黃耆防風小茴香炒白蒺藜炒牡丹皮各等分上為細末酒糊為丸如梧桐子大每服五七十丸食後淡鹽湯送下五問三黃丸大黃黃連黃芩各等分為末蜜丸洗心散洗肝散薄荷當歸羌活防風大黃山梔子川芎甘草各等分㕮咀水煎服菊花散防風菊花蔓荊子枸杞子甘草白芷川芎密蒙花五味子羌活白蒺藜上各等分為末茶清調服六問硃砂膏杏仁二十個去皮尖油蕤仁二百個去皮尖油硼砂二兩蜂蜜二兩硃砂二兩冰片少許上各為末蜜熬旋旋入藥和勻成膏銅簪點眼定志丸石菖蒲二兩辰砂一兩遠志二兩白茯苓三兩人參二兩上末蜜丸桐子大每服三十丸燈心湯下人參茯苓煎人參一錢玄參五分白附子五分白茯苓一錢川續斷五分白殭蠶五分水煎去渣食後溫服七問洗心散桑白皮湯桑白皮蜜炒二兩黃芩五錢赤芍藥一錢山梔子炒一錢上水煎服瀉肺湯桑白皮三錢地骨皮三錢甘草二錢上水煎去渣食後溫服八問桑白皮湯桑白皮炒二兩黃芩五錢赤芍藥一錢梔子同煎服洗肺散黃芩二兩桑白皮一兩上為末每服三錢燈心湯食後送下艾煎丸香附子菊花夏枯草楮實子上各等分酒糊丸每服三十丸麥門湯送下食後服阿膠散九問密蒙花散密蒙花菊花木賊石決明白蒺藜羌活各等分為末每服二三錢茶清送下千里光散石決明煅二錢海金砂二錢菊花二錢甘草一錢上水煎去渣食後溫服十問蒼朮湯蒼朮藁本白芷羌活川芎甘草各等分㕮咀水煎服千里光散十一問豬苓湯豬苓滑石阿膠澤瀉水煎服苦參散赤芍藥防風甘草苦參天花粉上為末每服一錢米泔調送下艾煎丸艾葉醋煮肉蓯蓉去甲牛膝酒浸甘草桑葉山藥牛膠炒朱當歸各等分上為細末煉蜜為丸如梧桐子大每服二三十丸茶清送下晚蠶沙湯蠶沙炒四兩巴戟去心二兩苦楝皮二兩馬蘭花二兩上為細末每服二錢不拘時溫酒調下十二問地黃丸防風羌活黃芩黃連當歸熟地黃人參茯苓各等分水煎服還睛丸白蒺藜蟬蛻木賊草決明當歸菊花川芎青葙子密蒙花羌活楮實子石決明上等分為末蜜丸桐子大每服五十丸茶清下石燕子丸石燕子一雙煅醋碎十次玳瑁羚羊角犀角各一兩上為細末煉蜜為丸如梧桐子大每服三十丸食後薄荷湯化下十三問三黃丸大黃湯大當歸散治赤筋侵睛不退用當歸白朮甘草羌活牛蒡子梔子各等分為末每服二三錢白湯送下十四問連翹散連翹甘草黃芩朴硝梔子大黃薄荷蜂蜜少許各等分為末每服三錢蜜水調下密蒙花散十五問荊芥散荊芥菊花蔓荊子香附子甘草蒼朮石決明白芍藥草決明上各等分為末每服一二錢黑豆煎湯食後服青鹽散青鹽菊花熟地黃龍膽草地骨皮秦皮地膚子各等分上為末茶清調送下苦芥子散十六問半夏丸半夏南星豬苓各等分為末蜜丸薑湯送下辰砂丸辰砂五錢另研枯白礬一兩南星泡一兩半夏泡一兩上為細末生薑汁打糊為丸如梧桐子大每服三十丸食後淡薑湯送下亦治小兒風壅痰嗽桑螵硝丸十七問蒺藜散蒺藜甘草防風石決明川芎當歸羌活芍藥各三兩蛇蛻五錢蟬蛻十個去頭足蒼朮三兩上為末蜜丸薑湯送下石膏散石膏川芎細辛防風羌活川烏各等分上為末入麝少許研勻每服一錢茶清送下芎藭散川烏甘菊花川芎細辛防風生地黃荊芥當歸芍藥甘草人參羌活薄荷白芷茱萸茯神各等分為末每服二錢白湯調下十八問灸法風池穴風府穴十九問補腎丸巴戟山藥破故紙小茴香青鹽蓯蓉牡丹皮各五錢枸杞一兩上為末蜜丸空心鹽湯送下乳香丸全蠍七個殭蠶十四個草烏十九個蓽茇二十四個白芷胡椒四十九個乳香沒藥麝香細辛良薑各等分為末蜜丸鹽湯送下回陽湯二十問洗肝散乳香散乳香沒藥郁李仁杏仁各五錢人參一錢酸棗仁二兩上為末白湯送下瀉心湯黃連連翹山梔子大黃薄荷黃芩甘草各五錢朴硝二錢五分上㕮咀每服五錢水煎去渣食後溫服二十一問三黃丸四順散瀉肺湯二十二問蟬蛻無比散治大人小兒風毒傷肝目昏翳膜久患漸細小者及赤爛並治之茯苓甘草防風去蘆各四兩石決明鹽水煮研川芎羌活當歸酒浸焙乾各三兩赤芍藥十三兩蒺藜炒去刺半斤蟬蛻去頭足二兩蛇蛻油浸炙一兩蒼朮去皮十三兩上為末每服三錢白湯調下救睛丸沒藥龍膽草陳皮白芍藥梔子白朮人參甘草上各等分為末酒送下珍珠散朴硝淨爐甘石各等分冰片麝香各少許上研極細末點眼珊瑚琥珀膏辰砂另研為衣三錢丸成藥琥珀一錢人參二錢石菖蒲天門冬遠志茺蔚子白茯苓麥門冬各一兩上為細末煉蜜為丸如梧桐子大每服二十丸食後清茶送下二十三問救睛丸菊花丸菊花四兩巴戟一兩去心五味子三兩肉蓯蓉酒浸焙乾二兩枸杞子三兩上為蜜丸每服五十丸酒或鹽湯下阿膠煎二十四問洗肝散決明丸黃連五錢黃芩一兩大黃三兩上末蜜丸桐子大每服五十丸茶清下珊瑚琥珀膏救睛丸二十五問夜光椒紅丸川椒五錢夜明砂一兩菊花石決明煅二兩川芎一兩蟬蛻五錢蒺藜五錢防風五錢黃連蒼朮二兩陳皮一兩白朮五錢茴香一兩蕤仁五錢白芷細辛蘇木各一兩上為末蜜丸每服三五十丸白湯下地黃活血煎當歸一兩生地黃川芎香白芷羌活各五錢乳香沒藥各一錢上為細末煉蜜為丸如梧桐子大每服三十丸食後薄荷荊芥煎湯送下當歸鹿茸丸二十六問川芎散當歸活血散當歸酒浸三兩赤芍藥酒浸二兩川芎二兩熟地二兩防風菊花蒺藜蟬蛻草決明各一兩甘草五錢上為末每服三錢訶子湯送下二十七問明目益腎丸枸杞子一兩當歸一兩酒浸曬乾生地黃照上制知母七錢五味子五錢山藥五錢茯神一兩黃柏七錢酒浸人參五錢巴戟甘草水煮去心菟絲子一兩酒浸甘草五錢天門冬五錢上藥為末以蜜丸每服三五十丸鹽湯下明目地黃丸石斛去苗枳殼去白曲炒生漆渣酒浸三兩杏仁去皮尖油防風去蘆生地黃熟地黃酒浸各半斤俱為末蜜丸酒鹽送下蟬花散順肝丸透經勻氣丸二十八問地黃丸五苓散豬苓澤瀉白朮茯苓肉桂上各等分為末茵陳湯送下連翹丸連翹神麯香附子白朮麥芽半夏藿香各等分上為末糊丸每服三十丸薑湯送下補肝丸當歸車前子防風芍藥蕤仁熟地黃川芎枳實各等分上為細末煉蜜為丸如梧桐子大每服七十丸不拘時溫水送下二十九問木賊散菊花甘草夏枯草木賊去節米泔水浸一宿曬乾桑白皮各等分為末每服一錢茵陳煎湯送下連翹散三十問香附豬苓散香附子豬苓赤茯苓澤瀉滑石各等分為末每服一錢薑湯送下白朮湯益黃湯陳皮青皮訶子肉丁香甘草上末每服五錢水煎去渣食後溫服三十一問洗心散解肌湯菊花餅子菊花甘草防風荊芥蟬蛻大黃石決明各等分上為細末煉蜜為丸成餅每服一餅食後茶清化下